name: Backend CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'infra/docker-compose.prod.yml'
      - '.github/workflows/backend-ci-cd.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'infra/docker-compose.prod.yml'
      - '.github/workflows/backend-ci-cd.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/merchant-installment-backend

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Syntax check
        run: python -m compileall -q backend/app

      - name: Import check
        env:
          PYTHONPATH: backend
        run: python -c "from app.main import app; print(app.title)"

      - name: Build backend Docker image
        run: docker build -t merchant-backend-ci:latest backend

  backend-image:
    name: Build and Push Backend Image
    needs: backend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  backend-deploy:
    name: Backend Deploy
    needs:
      - backend-ci
      - backend-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
            BACKEND_IMAGE="$BACKEND_IMAGE" docker compose -f infra/docker-compose.prod.yml pull backend
            BACKEND_IMAGE="$BACKEND_IMAGE" docker compose -f infra/docker-compose.prod.yml up -d backend
            docker compose -f infra/docker-compose.prod.yml ps
